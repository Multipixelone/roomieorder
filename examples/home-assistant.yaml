# Home Assistant wiring for roomieorder (PLAN §3.1) — REFERENCE SHAPE ONLY.
#
# You don't hand-write this. The flake's `lib.haButtons { catalogFile; endpoint; }`
# generates the rest_command, one script per catalog item, and the button grid
# from catalog.json — single source of truth (see PLAN-ROOMIE.md §3). This file
# shows what that output looks like, for readers not using Nix.
#
# 1. Put the rest_command + scripts below into configuration.yaml (or a
#    package). Point the URL at wherever `roomieorder serve` listens —
#    localhost:8723 if HA runs on the same box, otherwise the host's IP.
# 2. Add the button card (bottom) to a dashboard.
#
# The dashboard only ever sends an item_key. Everything money-related (item
# number, price ceiling, cooldown) lives in catalog.json on the roomieorder side, so a
# misconfigured button can't order the wrong thing or override a guard.

rest_command:
  roomieorder_reorder:
    url: "http://localhost:8723/reorder"
    method: POST
    content_type: "application/json"
    payload: '{"item_key": "{{ item_key }}", "requester": "{{ requester | default(''household'') }}"}'
    # 200 even for guard rejections (cooldown/debounce) — those are expected,
    # not errors.
    verify_ssl: false

script:
  order_paper_towels:
    alias: Order paper towels
    sequence:
      - service: rest_command.roomieorder_reorder
        data:
          item_key: paper_towels

  order_toilet_paper:
    alias: Order toilet paper
    sequence:
      - service: rest_command.roomieorder_reorder
        data:
          item_key: toilet_paper

  order_dish_soap:
    alias: Order dish soap
    sequence:
      - service: rest_command.roomieorder_reorder
        data:
          item_key: dish_soap

# ─────────── Status sensors (gray-out source) ───────────
# One REST poll of GET /items feeds a sensor per item. The `on_cooldown`
# attribute is what the dashboard buttons read to gray themselves out; the state
# is the last *placed* order timestamp so a card can show "ordered N days ago".
# `/items` is keyed by item_key, so each sensor pulls just its own item out of
# the payload. (Only placed orders arm the cooldown — nothing grays while the
# service runs in DRY_RUN.)

rest:
  - resource: "http://localhost:8723/items"
    method: GET
    scan_interval: 30
    sensor:
      - name: roomieorder_paper_towels
        unique_id: roomieorder_paper_towels
        device_class: timestamp
        value_template: "{{ value_json['paper_towels']['last_placed_at'] }}"
        json_attributes_path: "$['paper_towels']"
        json_attributes: [title, category, on_cooldown, cooldown_until, cooldown_days, last_placed_at]
      # …one sensor per catalog item (toilet_paper, dish_soap, …).

# ─────────── Dashboard card ───────────
# Lovelace — one `custom:mushroom-template-card` per staple (HACS `mushroom`
# required). Outside its cooldown the card is a teal tappable button; inside it
# grays out (icon_color: disabled) and the secondary line says when it was last
# ordered. One card, no `conditional` swap. When catalog items set a `category`,
# the generator groups them under a `## <category>` markdown heading.
#
# type: grid          # the generator wraps this in a vertical-stack when
# columns: 2          # categories are present (heading + grid per category)
# square: false
# cards:
#   - type: custom:mushroom-template-card
#     primary: Paper Towels
#     icon: mdi:paper-roll
#     fill_container: true
#     icon_color: "{% if is_state_attr('sensor.roomieorder_paper_towels', 'on_cooldown', true) %}disabled{% else %}teal{% endif %}"
#     secondary: >-
#       {% set s = states('sensor.roomieorder_paper_towels') %}
#       {% if is_state_attr('sensor.roomieorder_paper_towels', 'on_cooldown', true)
#       and s not in ['unknown', 'unavailable', ''] %}{{ relative_time(as_datetime(s)) }} ago{% endif %}
#     tap_action: { action: perform-action, perform_action: script.order_paper_towels }
#   # …one card per item (toilet_paper, dish_soap, …).

# ─────────── Per-owner grids (personal dashboards) ───────────
# A catalog item with an `owner` (e.g. finn_protein_bars → "owner": "Finn") is a
# roommate's personal buy: a placed order logs `ordered for Finn` in Sheets, and
# the generator keeps that item OFF the shared grid. lib.haButtons exposes three
# dashboard cards so you can split shared vs personal:
#
#   .dashboardCardDynamic    → every item (owned + shared); unchanged.
#   .dashboardCardHousehold  → shared grid with owner-tagged items removed —
#                              put this on the shared/household dashboard.
#   .dashboardCardsByOwner   → { "Finn" = <grid of Finn's items>; … } — splice
#                              the owner you want into that person's dashboard.
#
# Nix wiring (the real deployment uses lib.haButtons directly):
#   let buttons = inputs.roomieorder.lib.haButtons {
#         catalogFile = ./catalog.json; endpoint = "http://192.168.6.6:8723";
#       };
#   in {
#     # shared dashboard view — personal items excluded
#     views = [ { title = "Reorder"; cards = [ buttons.dashboardCardHousehold ]; } ];
#     # Finn's personal dashboard view
#     # cards = [ buttons.dashboardCardsByOwner."Finn" ];
#   }
